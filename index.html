<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 驾驶助手 | 小王</title>
  <style>
    :root {
      --bg-deep: #020408;
      --bg-surface: rgba(15, 23, 42, 0.9);
      --accent-primary: #00e5ff;
      --accent-secondary: #7000ff;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.1) 0%, transparent 50%);
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(40px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      transition: all 0.3s ease;
    }

    .sidebar-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #fff, var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .history-item {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .history-item.active {
      border-color: var(--accent-primary);
      background: rgba(0, 229, 255, 0.08);
    }

    .history-item .time {
      color: var(--text-secondary);
      font-size: 0.75rem;
      display: block;
      margin-bottom: 4px;
    }

    /* Main Dialogue Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, rgba(15, 25, 50, 0.3) 0%, transparent 70%);
    }

    .chat-container {
      flex: 1;
      padding: 60px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }

    .msg {
      max-width: 70%;
      padding: 18px 24px;
      border-radius: 24px;
      line-height: 1.6;
      font-size: 1.05rem;
      animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    @keyframes popUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--bg-surface);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
      color: #e2e8f0;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* AI Orb Controller */
    .orb-panel {
      height: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 50px;
    }

    .orb-glow-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-main {
      width: 70px;
      height: 70px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 40px var(--accent-primary);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 5;
    }

    .orb-main::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, transparent);
      opacity: 0.7;
    }

    /* Ambient rings */
    .ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 50%;
      animation: ringSpin 4s linear infinite;
    }

    @keyframes ringSpin {
      to {
        transform: rotate(360deg) scale(1.5);
        opacity: 0;
      }
    }

    /* Orb State Classes */
    .orb-main.listening {
      animation: breathe 1.5s infinite alternate;
      background: #fff;
      box-shadow: 0 0 60px #fff;
      width: 85px;
      height: 85px;
    }

    .orb-main.speaking {
      animation: vibrate 0.2s infinite;
      transform: scale(1.1);
    }

    @keyframes breathe {
      from {
        transform: scale(1);
        opacity: 0.8;
      }

      to {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes vibrate {
      0% {
        transform: scale(1.1) translate(0);
      }

      33% {
        transform: scale(1.1) translate(2px, -1px);
      }

      66% {
        transform: scale(1.1) translate(-1px, 2px);
      }

      100% {
        transform: scale(1.1) translate(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 40px var(--accent-primary);
      }

      50% {
        transform: scale(1.1);
        opacity: 0.7;
        box-shadow: 0 0 60px var(--accent-secondary);
      }

      100% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 40px var(--accent-primary);
      }
    }

    .status-badge {
      margin-top: 25px;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      border: 1px solid var(--glass-border);
    }

    /* Input Bar */
    .input-footer {
      height: 100px;
      padding: 0 40px 30px 40px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 20;
    }

    .input-wrapper {
      flex: 1;
      height: 54px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 27px;
      display: flex;
      align-items: center;
      padding: 0 6px 0 20px;
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-primary);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
    }

    #type-selector {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #type-selector:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    #text-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 1rem;
      padding: 0 15px;
    }

    #text-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent-primary);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #send-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px var(--accent-primary);
    }

    #send-btn svg {
      width: 20px;
      height: 20px;
      fill: #000;
    }

    /* UI Utilities */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="app">
    <aside class="sidebar">
      <h1 class="sidebar-title">行程回顾</h1>
      <div class="history-list" id="history">
        <div class="history-item active">
          <span class="time">当前进行中</span>
          <strong>驾驶记录助手已就绪</strong>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="chat-container" id="chat">
        <div class="msg ai">你好，我是驾驶助手小王。检测到您已进入驾驶舱，随时可以对我说“开始行程”。</div>
      </div>

      <div class="orb-panel">
        <div class="orb-glow-wrap">
          <div class="ring"></div>
          <div class="ring" style="animation-delay: 2s"></div>
          <div id="orb" class="orb-main"></div>
        </div>
        <div class="status-badge" id="status">在线 - 等待唤醒</div>
      </div>

      <div class="input-footer">
        <select id="type-selector">
          <option value="command">指令模式</option>
          <option value="chat">闲聊模式</option>
        </select>
        <div class="input-wrapper">
          <input type="text" id="text-input" placeholder="在这输入'你好小王'或直接发送指令..." />
          <button id="send-btn">
            <svg viewBox="0 0 24 24">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    class AgentCore {
      constructor() {
        // LLM Configuration
        this.llmConfig = {
          model: 'gemini-3-flash',
          baseUrl: 'http://127.0.0.1:8045/v1',
          apiKey: 'sk-3408722146534b93a631e9512decd04d',
          prompt: '你是一个驾驶助手。能和驾驶员进行对话聊天，对用户输入的内容进行对话文字整理，接地气，进行回复，然后在播报。'
        };

        this.chatWrap = document.getElementById('chat');
        this.orbElem = document.getElementById('orb');
        this.statusElem = document.getElementById('status');
        this.historyWrap = document.getElementById('history');
        this.textInput = document.getElementById('text-input');
        this.sendBtn = document.getElementById('send-btn');
        this.typeSelector = document.getElementById('type-selector');

        this.isListening = false;
        this.isDriving = false;
        this.isThinking = false;
        this.recognition = null;
        this.synth = window.speechSynthesis;

        this.initEngine();
        this.initEvents();
      }

      initEvents() {
        this.sendBtn.onclick = () => this.handleTextSubmit();
        this.textInput.onkeypress = (e) => {
          if (e.key === 'Enter') this.handleTextSubmit();
        };
      }

      async handleTextSubmit() {
        const text = this.textInput.value.trim();
        if (!text || this.isThinking) return;

        this.textInput.value = '';
        this.addMsg('user', text);
        await this.processWithLLM(text);
      }

      async callLLM(userInput) {
        try {
          this.setOrbState('thinking');
          const response = await fetch(`${this.llmConfig.baseUrl}/chat/completions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${this.llmConfig.apiKey}`
            },
            body: JSON.stringify({
              model: this.llmConfig.model,
              messages: [
                { role: 'system', content: this.llmConfig.prompt },
                { role: 'user', content: userInput }
              ],
              temperature: 0.7
            })
          });

          const data = await response.json();
          return data.choices[0].message.content;
        } catch (error) {
          console.error('LLM Error:', error);
          return null;
        } finally {
          this.setOrbState(this.isListening ? 'listening' : 'idle');
        }
      }

      setOrbState(state) {
        this.orbElem.className = 'orb-main'; // Reset all classes
        this.orbElem.style.animation = ''; // Reset animation
        this.isThinking = false; // Reset thinking state

        if (state === 'listening') {
          this.orbElem.classList.add('listening');
          this.statusElem.textContent = '对话中 - 实时监听指令';
        } else if (state === 'speaking') {
          this.orbElem.classList.add('speaking');
          this.statusElem.textContent = '小王播报中';
        } else if (state === 'thinking') {
          this.orbElem.style.animation = 'pulse 0.5s infinite';
          this.statusElem.textContent = '小王思考中...';
          this.isThinking = true;
        } else { // idle or default
          this.statusElem.textContent = '在线 - 等待唤醒';
        }
      }

      initEngine() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) {
          this.addMsg('ai', '您的浏览器由于安全限制无法启动语音引擎，请检查麦克风权限或更换 Chrome 浏览器。');
          return;
        }

        this.recognition = new SpeechRec();
        this.recognition.continuous = true;
        this.recognition.lang = 'zh-CN';
        this.recognition.interimResults = false;

        this.recognition.onstart = () => {
          this.statusElem.textContent = '在线 - 语音实时就绪';
        };

        this.recognition.onresult = (e) => {
          const text = e.results[e.results.length - 1][0].transcript.trim();
          this.handleInput(text);
        };

        this.recognition.onend = () => {
          try { this.recognition.start(); } catch (err) { }
        };

        this.recognition.onerror = (err) => {
          console.error('REC ERROR:', err.error);
          if (err.error === 'not-allowed') {
            this.addMsg('ai', '由于您拒绝或尚未授予麦克风权限，小王暂时无法听见您的指令。');
          }
        };

        try { this.recognition.start(); } catch (err) { }
      }

      async handleInput(text) {
        const input = text.toLowerCase();

        if (input.includes('你好小王') || input.includes('你好，小王') || input.includes('你好小网')) {
          this.wake();
          return;
        }

        if (this.isListening) {
          this.addMsg('user', text);
          await this.processWithLLM(text);
        }
      }

      async processWithLLM(text) {
        if (this.isThinking) return;
        this.isThinking = true;

        // Use LLM to refine the input
        const refinedText = await this.callLLM(text);
        const finalText = refinedText || text; // Fallback to raw if API fails

        this.isThinking = false;
        this.process(finalText);
      }

      process(text) {
        const input = text.toLowerCase();

        // Exit Commands
        if (input.includes('再见') || input.includes('退下') || input.includes('休息') || input.includes('退出对话')) {
          this.isListening = false;
          this.speak('好的，那我也休息一会儿。需要我时随时喊我。');
          return;
        }

        if (input.includes('行程') && (input.includes('开始') || input.includes('预计'))) {
          this.isDriving = true;
          this.speak('收到。行程已确认，现在为您开启持续记录模式。');
          this.logHistory('🚗 已开启全程驾驶记录');
        } else if (input.includes('记录') || input.includes('不好') || input.includes('体验') || input.includes('超车-')) {
          this.speak('好的，这条反馈已同步至飞书。还有其他发现吗？');
          this.flashOrb('#00ff88');
        } else if (input.includes('结束') && input.includes('行程')) {
          this.isDriving = false;
          this.speak('好的，本次路程记录完毕。辛苦了，请问还没其他吩咐吗？');
          this.logHistory('🏁 行程归档');
        } else {
          // LLM outputs might be long, so we use them directly
          this.speak(text);
        }

        this.refreshTimeout();
      }

      wake() {
        this.isListening = true;

        const response = this.isDriving
          ? '我在呢，请问还有什么想记录的吗？'
          : '你好！我是驾驶助手。今天的行程为您准备好了，请问我们可以开始了吗？';

        this.speak(response, () => {
          // State remains 'listening' for continuous dialogue
          this.setOrbState('listening');
          this.refreshTimeout();
        });
      }

      speak(text, callback) {
        this.addMsg('ai', text);
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN';
        utter.rate = 1.1;

        this.setOrbState('speaking');

        utter.onend = () => {
          this.setOrbState(this.isListening ? 'listening' : 'idle');
          if (callback) callback();
        };

        this.synth.cancel();
        this.synth.speak(utter);
      }

      addMsg(role, text) {
        const msg = document.createElement('div');
        msg.className = `msg ${role}`;
        msg.textContent = text;
        this.chatWrap.appendChild(msg);
        this.chatWrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
        this.chatWrap.scrollTop = this.chatWrap.scrollHeight;
      }

      logHistory(title) {
        const card = document.createElement('div');
        card.className = 'history-item active';
        card.innerHTML = `<span class="time">${new Date().toLocaleTimeString()}</span><strong>${title}</strong>`;
        this.historyWrap.prepend(card);
      }

      flashOrb(color) {
        this.orbElem.style.boxShadow = `0 0 80px ${color}`;
        setTimeout(() => this.orbElem.style.boxShadow = '', 2000);
      }

      refreshTimeout() {
        if (this.timer) clearTimeout(this.timer);
        // Increase timeout to 10 seconds for continuous conversation
        this.timer = setTimeout(() => {
          if (this.isListening) {
            this.isListening = false;
            this.orbElem.className = 'orb-main';
            this.statusElem.textContent = '对话已超时 - 等待下一次唤醒';
          }
        }, 10000);
      }
    }

    window.onload = () => {
      window.assistant = new AgentCore();
    }
  </script>
</body>

</html>
