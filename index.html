<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 驾驶助手 | 小王</title>
  <style>
    :root {
      --bg-deep: #020408;
      --bg-surface: rgba(15, 23, 42, 0.9);
      --accent-primary: #00e5ff;
      --accent-secondary: #7000ff;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.1) 0%, transparent 50%);
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(40px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      transition: all 0.3s ease;
    }

    .sidebar-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #fff, var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .history-item {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .history-item.active {
      border-color: var(--accent-primary);
      background: rgba(0, 229, 255, 0.08);
    }

    .history-item .time {
      color: var(--text-secondary);
      font-size: 0.75rem;
      display: block;
      margin-bottom: 4px;
    }

    /* Main Dialogue Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, rgba(15, 25, 50, 0.3) 0%, transparent 70%);
    }

    .chat-container {
      flex: 1;
      padding: 60px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }

    .msg {
      max-width: 70%;
      padding: 18px 24px;
      border-radius: 24px;
      line-height: 1.6;
      font-size: 1.05rem;
      animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    @keyframes popUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--bg-surface);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
      color: #e2e8f0;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* AI Orb Controller */
    .orb-panel {
      height: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 50px;
    }

    .orb-glow-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-main {
      width: 70px;
      height: 70px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 40px var(--accent-primary);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 5;
    }

    .orb-main::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, transparent);
      opacity: 0.7;
    }

    /* Ambient rings */
    .ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 50%;
      animation: ringSpin 4s linear infinite;
    }

    @keyframes ringSpin {
      to {
        transform: rotate(360deg) scale(1.5);
        opacity: 0;
      }
    }

    /* Orb State Classes */
    .orb-main.listening {
      animation: breathe 1.5s infinite alternate;
      background: #fff;
      box-shadow: 0 0 60px #fff;
      width: 85px;
      height: 85px;
    }

    .orb-main.speaking {
      animation: vibrate 0.2s infinite;
      transform: scale(1.1);
    }

    @keyframes breathe {
      from {
        transform: scale(1);
        opacity: 0.8;
      }

      to {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes vibrate {
      0% {
        transform: scale(1.1) translate(0);
      }

      33% {
        transform: scale(1.1) translate(2px, -1px);
      }

      66% {
        transform: scale(1.1) translate(-1px, 2px);
      }

      100% {
        transform: scale(1.1) translate(0);
      }
    }

    .status-badge {
      margin-top: 25px;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      border: 1px solid var(--glass-border);
    }

    /* UI Utilities */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="app">
    <aside class="sidebar">
      <h1 class="sidebar-title">行程回顾</h1>
      <div class="history-list" id="history">
        <div class="history-item active">
          <span class="time">当前进行中</span>
          <strong>驾驶记录助手已就绪</strong>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="chat-container" id="chat">
        <div class="msg ai">你好，我是驾驶助手小王。检测到您已进入驾驶舱，随时可以对我说“开始行程”。</div>
      </div>

      <div class="orb-panel">
        <div class="orb-glow-wrap">
          <div class="ring"></div>
          <div class="ring" style="animation-delay: 2s"></div>
          <div id="orb" class="orb-main"></div>
        </div>
        <div class="status-badge" id="status">在线 - 等待唤醒</div>
      </div>
    </main>
  </div>

  <script>
    class AgentCore {
      constructor() {
        this.chatWrap = document.getElementById('chat');
        this.orbElem = document.getElementById('orb');
        this.statusElem = document.getElementById('status');
        this.historyWrap = document.getElementById('history');

        this.isListening = false;
        this.isDriving = false;
        this.recognition = null;
        this.synth = window.speechSynthesis;

        this.initEngine();
      }

      initEngine() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) {
          this.addMsg('ai', '您的浏览器由于安全限制无法启动语音引擎，请检查麦克风权限或更换 Chrome 浏览器。');
          return;
        }

        this.recognition = new SpeechRec();
        this.recognition.continuous = true;
        this.recognition.lang = 'zh-CN';
        this.recognition.interimResults = false;

        this.recognition.onstart = () => {
          this.statusElem.textContent = '在线 - 语音实时就绪';
        };

        this.recognition.onresult = (e) => {
          const text = e.results[e.results.length - 1][0].transcript.trim();
          this.handleInput(text);
        };

        this.recognition.onend = () => {
          try { this.recognition.start(); } catch (err) { }
        };

        this.recognition.onerror = (err) => {
          console.error('REC ERROR:', err.error);
          if (err.error === 'not-allowed') {
            this.addMsg('ai', '由于您拒绝或尚未授予麦克风权限，小王暂时无法听见您的指令。');
          }
        };

        try { this.recognition.start(); } catch (err) { }
      }

      handleInput(text) {
        const input = text.toLowerCase();

        if (input.includes('你好小王') || input.includes('你好，小王') || input.includes('你好小网')) {
          this.wake();
          return;
        }

        if (this.isListening) {
          this.process(text);
        }
      }

      wake() {
        this.isListening = true;
        this.addMsg('user', '你好，小王。');

        const response = this.isDriving
          ? '我在呢，时刻为您反馈路况信息。'
          : '你好，我是您的驾驶助手，今天您打算去哪？';

        this.speak(response, () => {
          this.orbElem.className = 'orb-main listening';
          this.statusElem.textContent = '命令模式 - 请下达指令';
          this.refreshTimeout();
        });
      }

      process(text) {
        this.addMsg('user', text);
        const input = text.toLowerCase();

        if (input.includes('行程') && (input.includes('开始') || input.includes('预计'))) {
          this.isDriving = true;
          this.speak('收到。行程已确认，播报内容同步中，现在正式开始驾驶记录。');
          this.logHistory('🚗 已开启全程驾驶记录');
        } else if (input.includes('记录') || input.includes('不好') || input.includes('体验') || input.includes('超车')) {
          this.speak('没问题，这条驾驶感言已预计帮您记录到了飞书多维表格。');
          this.flashOrb('#00ff88');
        } else if (input.includes('结束') && input.includes('行程')) {
          this.isDriving = false;
          this.speak('好的，本次路线驾驶记录已完整归档。辛苦了！');
          this.logHistory('🏁 行程归档');
        } else {
          this.speak('收到，为您记录好了。');
        }

        this.isListening = false;
        this.orbElem.className = 'orb-main';
        this.statusElem.textContent = '在线 - 等待唤醒';
      }

      speak(text, callback) {
        this.addMsg('ai', text);
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN';
        utter.rate = 1.1;

        this.orbElem.className = 'orb-main speaking';
        this.statusElem.textContent = '小王播报中';

        utter.onend = () => {
          this.orbElem.className = 'orb-main';
          this.statusElem.textContent = '在线 - 等待唤醒';
          if (callback) callback();
        };

        this.synth.cancel();
        this.synth.speak(utter);
      }

      addMsg(role, text) {
        const msg = document.createElement('div');
        msg.className = `msg ${role}`;
        msg.textContent = text;
        this.chatWrap.appendChild(msg);
        this.chatWrap.scrollTop = this.chatWrap.scrollHeight;
      }

      logHistory(title) {
        const card = document.createElement('div');
        card.className = 'history-item active';
        card.innerHTML = `<span class="time">${new Date().toLocaleTimeString()}</span><strong>${title}</strong>`;
        this.historyWrap.prepend(card);
      }

      flashOrb(color) {
        this.orbElem.style.boxShadow = `0 0 80px ${color}`;
        setTimeout(() => this.orbElem.style.boxShadow = '', 2000);
      }

      refreshTimeout() {
        if (this.timer) clearTimeout(this.timer);
        this.timer = setTimeout(() => {
          this.isListening = false;
          this.orbElem.className = 'orb-main';
        }, 5000);
      }
    }

    window.onload = () => {
      window.assistant = new AgentCore();
    }
  </script>
</body>

</html>
